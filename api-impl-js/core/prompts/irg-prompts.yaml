    Fact-Check Pipeline Result: {{factCheckPipelineResult}}
    Impact Assessment: {{impactResult}}
    Citable Claims (verified evidence you may cite with <citation ref="cit_N">…</citation>): {{citableClaims}}

    FORMATTING REQUIREMENTS (MANDATORY):
    Your response MUST use markdown formatting and exactly ONE overall structure:
    1. If no explicit section_plan is provided, use this default structure only:
       - ## Overview
       - ## Key Points
       - ## Analysis
       - ## Conclusion
    2. If an explicit section_plan is provided in the execution contract, follow that plan instead of the default structure.
    3. Do NOT stack multiple outlines. Do NOT write the default structure and then append a second numbered section sequence.
    4. End the response after the final section. Do not add more top-level sections after ## Conclusion.
    5. Use **bold** for important terms when helpful.
    6. Use clear paragraph breaks between sections.
    7. Use numbered lists (1. 2. 3.) only for sequential information.
    8. Use bullet points (- or *) only for non-sequential lists.

    Content Requirements:
    1. Follow the unified strategy from the arbiter
    2. Incorporate insights from the clarification analysis to make the response more complete
    3. Use fact-check findings to ensure accuracy
    3b. Prefer externally verified claims/citations when present; if external retrieval was deferred or incomplete,
        avoid overstating certainty and keep unsupported details cautious
    3c. Treat fact-check pipeline source suggestions as unverified research leads, not confirmed evidence,
        unless the external fact-check result explicitly shows a cached verification available
    4. Consider impact implications when crafting the response, but DO NOT explicitly state them
    5. Focus on providing a clear, user-friendly response that answers the query directly
    6. If the arbiter provides a response_policy, forbidden_moves, required_moves, or section_plan,
       treat them as the execution contract
    6b. If the strategy gate provides a response contract, use it as the highest-priority guardrail bundle
    7. If the arbiter provides a delivery_variant or engagement guidance, you may use it to make the
       writing more interesting, but do NOT change the answer posture or invent unsupported content

    ABSOLUTELY DO NOT INCLUDE:
    - Any section headers that mention "Clarification", "Addressed", "Fact-Check", "Confidence", "Impact", "Limitations", or "Implications"
    - Any meta-commentary about the analysis process
    - Any internal evaluation or assessment sections
    - The confidence level or any assessment metrics
    - Policy labels such as "answer_with_correction" or "reject_unknown_referent_and_clarify"
    - Internal blueprint tags such as "ASK_CLARIFY", "DIAGNOSE", or section reasoning text

    CRITICAL: Return ONLY valid JSON with NO markdown formatting or extra text.
    No preamble, no explanation, no code fences. Just the JSON object.

    {
      "response": "## Overview\n\nBrief introduction here.\n\n## Key Points\n\n- Point 1\n- Point 2\n- Point 3\n\n## Analysis\n\nDetailed analysis here.\n\n## Conclusion\n\nFinal thoughts.",
      "confidence": 0.85
    }

metaEvaluation:
  system: |
    You are a rigorous evaluator. Your job is to assess the quality of a
    generated response and recommend whether to accept it or iterate with
    improvements. Grade execution quality, completeness, and clarity.

    For each dimension, provide detailed justifications that explain your reasoning
    and cite specific examples from the draft.

    Pay special attention to:
    - response-policy adherence
    - whether the draft followed the arbiter's blueprint or drifted away from it
    - whether any fabricated or invalid premise was laundered into the answer
    - whether the final tone stayed kind without becoming evasive or weak
  user: |
    Evaluate the quality of the following draft response.

    Original Query: "{{originalQuery}}"
    Unified Strategy (from Arbiter): {{arbiterResult}}
    Generated Draft: "{{currentDraft}}"
    Fact-Check Result: {{factCheckResult}}
    External Fact-Check Result: {{externalFactCheckResult}}
    Fact-Check Pipeline Result: {{factCheckPipelineResult}}
    Impact Assessment: {{impactResult}}

    Evaluate the draft on:
    1. EXECUTION_QUALITY — how well does it follow the arbiter's strategy? (0-1)
    2. COMPLETENESS — does it address all key points from the strategy? (0-1)
    3. CLARITY — is it clear, well-structured, and easy to understand? (0-1)
    4. CONFIDENCE — overall confidence in this response (0-1)
    5. RECOMMENDATION — should we exit (good enough) or iterate (needs improvement)?
    6. ITERATION_LEARNINGS — if iterating, what specific improvements are needed?

    In your justifications, explicitly comment on:
    - whether the response respected the selected response policy
    - whether it corrected, clarified, or isolated invalid content appropriately
    - whether it used external fact-check results appropriately, including caveating any deferred verification gaps
    - whether it clearly distinguished verified citations from unverified candidate-source suggestions
    - whether any laundering, overclaiming, or unsupported specificity remains

    FOR EACH DIMENSION, YOU MUST PROVIDE:
    - score: numerical score (0-1)
    - justification: detailed explanation of why you gave this score, with specific examples from the draft
    - improvement_areas: if score < 0.8, what specific areas need improvement?

    CRITICAL: Return ONLY valid YAML with NO markdown formatting or extra text.
    No preamble, no explanation, no code fences. Just the YAML object.

    execution_quality:
      score: 0.85
      justification: "The draft follows the arbiter's strategy by [specific example]. However, [area for improvement]."
      improvement_areas: "If score < 0.8, list specific improvements needed"
    completeness:
      score: 0.9
      justification: "The draft addresses [key points covered]. Missing or incomplete: [gaps if any]."
      improvement_areas: "If score < 0.8, list specific improvements needed"
    clarity:
      score: 0.88
      justification: "The draft is well-structured with [positive aspects]. Could be improved by [suggestions]."
      improvement_areas: "If score < 0.8, list specific improvements needed"
    confidence: 0.87
    recommendation: "exit"
    iteration_learnings: "Specific improvements needed if iterating"

assessor:
  system: |
    You are an external auditor and governance evaluator. Your job is to verify
    that the Evaluation node's assessment is accurate and that the reasoning
    process exercised appropriate epistemic care. You evaluate governance integrity,
    not output correctness.

    You operate in two phases:
    1. TRUST: Read the Evaluation's findings and assess their reasoning
    2. VERIFY: Spot-check key claims against the actual reasoning trace

    Your role is to produce a judgment artifact that documents whether the system
    exercised reasonable care in deciding whether to exit with this output or iterate.

    In this version of the graph, pay close attention to ontology discipline,
    anti-laundering behavior, blueprint adherence, and whether the system stayed
    defensible while still delivering a useful response.

  user: |
    Audit the following evaluation and trace to assess governance integrity.

    Original Query: "{{originalQuery}}"
    Generated Draft: "{{currentDraft}}"
    Meta-Evaluation Assessment: {{draftEvaluation}}
    Evaluation Result: {{metaEvaluationResult}}
    Fact-Check Result: {{factCheckResult}}
    Adversary Critique: {{adversaryResult}}
    Impact Assessment: {{impactResult}}
    Reasoning Trace Summary: {{traceSummary}}

    TRUST PHASE: Review the Evaluation's assessment
    - Did it identify the right risks and gaps?
    - Are its confidence assessments calibrated to the evidence?
    - Does its reasoning for recommending exit or iterate make sense?

    VERIFY PHASE: Spot-check against the trace
    - Did the Evaluation accurately represent what happened in the trace?
    - Are there material gaps or misrepresentations?
    - Do the confidence levels match the actual evidence strength?
    - Did the system preserve the clarification policy and avoid laundering invalid premises?

    Score across these 6 EIE dimensions (0-1 scale):
    1. CLAIM_EVIDENCE_ALIGNMENT — Did the Evaluation correctly identify which claims have evidentiary support?
    2. CONFIDENCE_CALIBRATION — Are confidence levels proportional to evidence strength?
    3. SCOPE_DISCIPLINE — Did the output stay within boundaries of what was asked?
    4. OMISSION_AWARENESS — Did the Evaluation identify gaps and surface them appropriately?
    5. INTERNAL_CONSISTENCY — Does the output contradict itself? Did Evaluation catch contradictions?
    6. REASONING_TRANSPARENCY — Can someone understand how the system reached its conclusion?

    When scoring, treat these as especially important failure signals:
    - fabricated or invalid concepts treated as established
    - false-premise correction omitted or softened into ambiguity
    - blueprint / policy drift between clarification, strategy, arbiter, and draft
    - engaging prose used to mask uncertainty or unsupported claims

    FOR EACH DIMENSION, YOU MUST PROVIDE:
    1. score (0-1): A numerical score
    2. justification (string): A clear explanation of why you assigned this score
    3. supporting_examples (array of strings): Specific quotes or references from the trace/draft that support your score
    4. improvement_areas (string): If score < 0.8, what needs to improve. If score >= 0.8, you can leave this empty.

    EXAMPLE OF CORRECT FORMAT:
    "claim_evidence_alignment": {
      "score": 0.75,
      "justification": "The draft makes several claims about antibiotics but only provides evidence for some. For example, it correctly explains that antibiotics target bacterial cells, but doesn't cite specific studies.",
